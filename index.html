<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Frog Pond</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      overscroll-behavior: none;
      -webkit-overflow-scrolling: auto;
    }
    body {
      background: #0a0a12;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      position: fixed;
      width: 100%;
      touch-action: none;
    }
    canvas {
      width: min(90vw, 90vh);
      height: min(90vw, 90vh);
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: -webkit-crisp-edges;
      touch-action: none;
    }

// ─── Upgrades Registry ──────────────────────────────
const UPGRADES = [

// ─── Save System ────────────────────────────────────
const SAVE_KEY = 'frogpond';
function loadSave() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      return {
        level: s.level || 1, xp: s.xp || 0,
        skillPoints: s.skillPoints || 0,
        selectedFrog: s.selectedFrog || 0,
        unlocked: s.unlocked || [0],
        upgrades: s.upgrades || [],
      };
    }
  } catch(e) {}
  return { level: 1, xp: 0, skillPoints: 0, selectedFrog: 0, unlocked: [0], upgrades: [] };
}
function writeSave() { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); }
const save = loadSave();

// ─── Effective Stats ────────────────────────────────
function eff() {
  const u = save.upgrades;
  return {
    jumpDur:  CONFIG.JUMP_DURATION * (u.includes('swift') ? 0.8 : 1),
    jumpArc:  CONFIG.JUMP_ARC * (u.includes('high') ? 1.25 : 1),
    aimCone:  u.includes('reach') ? Math.PI / 2.5 : CONFIG.AIM_CONE,
    spawnMs:  CONFIG.FRUIT_SPAWN_MS * (u.includes('abundant') ? 0.7 : 1),
    bonusPts: u.includes('bountiful') ? 5 : 0,
    maxFruit: CONFIG.MAX_FRUIT + (u.includes('plenty') ? 2 : 0),
  };
}

// ─── XP ─────────────────────────────────────────────
function xpForLevel(lv) { return Math.floor(50 * Math.pow(lv, 1.5)); }

// ─── State ──────────────────────────────────────────
const cam = { x: 192, y: 192, tx: 192, ty: 192 };
const state = {
  screen: 'title', // 'title' | 'playing' | 'paused' | 'upgrades'
  prevScreen: 'title', // where to return from upgrades
  score: 0,
  frog: { pad: 0, target: null, jumpStart: 0, jumping: false, drawX: 0, drawY: 0 },
  pads: [],
  currentSection: 0,
  lastSpawn: 0,
  time: 0,
  waterPhase: 0,
  flash: 0,
  levelUp: 0,
  sectionLabel: 0,
  sectionName: '',
  menuCursor: 0,
  menuItems: [],
  pauseCursor: 0,
  atmosphere: { fogPatches: [], particles: [], vignetteGrad: null },
};

// ─── Canvas ─────────────────────────────────────────
const canvas = document.getElementById('pond');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
let hasTouchInput = false;

// ─── Utilities ──────────────────────────────────────
function dist(a, b) { return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2); }
function normAngle(a) { while (a > Math.PI) a -= 2 * Math.PI; while (a < -Math.PI) a += 2 * Math.PI; return a; }
function remapSprite(sprite, colorMap) {
  if (!colorMap) return sprite;
  return sprite.map(row => row.map(c => colorMap[c] !== undefined ? colorMap[c] : c));
}
function sectionOf(pad) { return pad.section; }
function inView(wx, wy, margin) {
  const sx = wx - cam.x, sy = wy - cam.y;
  return sx > -margin && sx < W + margin && sy > -margin && sy < H + margin;
}
function touchToCanvas(touch) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (touch.clientX - rect.left) * (W / rect.width),
    y: (touch.clientY - rect.top) * (H / rect.height),
  };
}
function angleToDirection(dx, dy) {
  return Math.abs(dx) >= Math.abs(dy)
    ? (dx >= 0 ? 'right' : 'left')
    : (dy >= 0 ? 'down' : 'up');
}

// ─── World Generation ───────────────────────────────
function generateWorld() {
  const pads = [];
  const R = CONFIG.PAD_RADIUS;
  const minD = R * 2.8;

  // Generate interior pads for each section
  SECTIONS.forEach((sec, si) => {
    const margin = 30;
    const count = sec.padCount;

    // First pad near center of section
    pads.push({
      x: sec.wx + W / 2, y: sec.wy + H / 2,
      section: si, hasFruit: false, fruitType: null,
    });

    let attempts = 0;
    const secPads = pads.filter(p => p.section === si);
    while (secPads.length < count && attempts < 200) {
      const c = {
        x: sec.wx + margin + Math.random() * (W - margin * 2),
        y: sec.wy + margin + Math.random() * (H - margin * 2),
        section: si, hasFruit: false, fruitType: null,
      };
      const tooClose = pads.some(p => dist(p, c) < minD);
      const reachable = secPads.some(p => dist(p, c) < minD * 2.2);
      if (!tooClose && reachable) {
        pads.push(c);
        secPads.push(c);
      }
      attempts++;
    }
  });

  // Generate bridge pads at borders
  BORDERS.forEach(([sA, sB, side]) => {
    const a = SECTIONS[sA], b = SECTIONS[sB];
    // Place a pad near the edge of each section, aligned so they're jumpable
    const spread = 40 + Math.random() * 60; // lateral position variation
    let ax, ay, bx, by;

    if (side === 'top') {
      ax = a.wx + 60 + spread; ay = a.wy + 18;
      bx = b.wx + 60 + spread; by = b.wy + H - 18;
    } else if (side === 'bottom') {
      ax = a.wx + 60 + spread; ay = a.wy + H - 18;
      bx = b.wx + 60 + spread; by = b.wy + 18;
    } else if (side === 'left') {
      ax = a.wx + 18; ay = a.wy + 60 + spread;
      bx = b.wx + W - 18; by = b.wy + 60 + spread;
    } else { // right
      ax = a.wx + W - 18; ay = a.wy + 60 + spread;
      bx = b.wx + 18; by = b.wy + 60 + spread;
    }

    // Only add if not too close to existing pads
    if (!pads.some(p => dist(p, {x:ax,y:ay}) < minD * 0.8)) {
      pads.push({ x: ax, y: ay, section: sA, hasFruit: false, fruitType: null, isBridge: true });
    }
    if (!pads.some(p => dist(p, {x:bx,y:by}) < minD * 0.8)) {
      pads.push({ x: bx, y: by, section: sB, hasFruit: false, fruitType: null, isBridge: true });
    }
  });

  return pads;
}

// ─── Drawing ────────────────────────────────────────
function drawSprite(sprite, x, y) {
  for (let r = 0; r < sprite.length; r++) {
    for (let c = 0; c < sprite[r].length; c++) {
      const idx = sprite[r][c];
      if (!idx) continue;
      ctx.fillStyle = P[idx];
      ctx.fillRect(Math.floor(x + c), Math.floor(y + r), 1, 1);
    }
  }
}

function drawWater() {
  ctx.fillStyle = P[5];
  ctx.fillRect(0, 0, W, H);
  state.waterPhase += 0.015;
  for (let y = 0; y < H; y += 6) {
    const off = Math.sin((y + state.waterPhase * 40) * 0.12) * 1.5;
    ctx.fillStyle = P[13];
    ctx.fillRect(0, y + Math.floor(off), W, 1);
  }
  for (let y = 3; y < H; y += 12) {
    const off = Math.cos((y + state.waterPhase * 25) * 0.09) * 2;
    ctx.fillStyle = P[15];
    ctx.fillRect(0, y + Math.floor(off), W, 1);
  }
  // Water shimmer — moonlight reflection points
  const phase = state.waterPhase;
  ctx.fillStyle = LIGHT.waterHighlight;
  for (let i = 0; i < 35; i++) {
    const sx = Math.floor((Math.sin(i * 7.3 + phase * 1.2) * 0.5 + 0.5) * W);
    const sy = Math.floor((Math.sin(i * 13.7 + phase * 0.8) * 0.5 + 0.5) * H);
    if (Math.sin((sy + phase * 40) * 0.12) > 0.3) {
      ctx.fillRect(sx, sy, 1, 1);
    }
  }
  // Rare bright sparkles (fewer, wider)
  ctx.fillStyle = LIGHT.waterHighlight2;
  for (let i = 0; i < 8; i++) {
    const sx = Math.floor((Math.sin(i * 11.1 + phase * 1.7) * 0.5 + 0.5) * W);
    const sy = Math.floor((Math.sin(i * 17.3 + phase * 1.1) * 0.5 + 0.5) * H);
    if (Math.sin((sy + phase * 40) * 0.12) > 0.5) {
      ctx.fillRect(sx, sy, 1, 1);
      ctx.fillRect(sx + 1, sy, 1, 1);
    }
  }
}

function drawLilyPad(x, y, r, isBridge) {
  x = Math.floor(x); y = Math.floor(y);
  const cTop = isBridge ? P[4] : P[3];
  const cBot = isBridge ? P[3] : P[2];
  for (let dy = -r; dy <= r; dy++) {
    const w = Math.floor(Math.sqrt(r * r - dy * dy));
    ctx.fillStyle = P[11];
    ctx.fillRect(x - w + 1, y + dy + 1, w * 2, 1);
    ctx.fillStyle = dy < -r / 3 ? cTop : cBot;
    ctx.fillRect(x - w, y + dy, w * 2, 1);
  }
  ctx.fillStyle = P[5];
  for (let i = 0; i < r; i++) {
    const nw = Math.max(1, Math.floor(i * 0.4));
    ctx.fillRect(x - nw, y - r + i, nw * 2, 1);
  }
  // Specular highlight — moonlight glint on upper-left
  ctx.fillStyle = LIGHT.specular;
  const specX = x - Math.floor(r * 0.35);
  const specY = y - Math.floor(r * 0.45);
  ctx.fillRect(specX, specY, 2, 1);
  ctx.fillRect(specX, specY + 1, 1, 1);
  // Bounce light — water reflection on bottom-right rim
  ctx.fillStyle = LIGHT.waterHighlight;
  for (let dy = Math.floor(r * 0.5); dy <= r; dy++) {
    const w = Math.floor(Math.sqrt(r * r - dy * dy));
    const rimW = Math.min(2, w);
    ctx.fillRect(x + w - rimW, y + dy, rimW, 1);
  }
}

function drawFruitOnPad(pad) {
  if (!pad.hasFruit) return;
  if (!inView(pad.x, pad.y, 20)) return;
  const sprite = FRUIT[pad.fruitType];
  const bob = Math.sin(state.time * 0.004) * 1.5;
  const sx = pad.x - cam.x, sy = pad.y - cam.y;
  drawSprite(sprite, sx - 3, sy - CONFIG.PAD_RADIUS - 4 + bob);
  // Fruit specular highlight + shadow accent
  const fx = Math.floor(sx - 3), fy = Math.floor(sy - CONFIG.PAD_RADIUS - 4 + bob);
  ctx.fillStyle = LIGHT.specular;
  ctx.fillRect(fx + 1, fy + 1, 1, 1);
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(fx + 4, fy + 4, 1, 1);
}

function drawFrog() {
  const f = state.frog;
  let wx, wy;
  if (f.jumping) {
    wx = f.drawX; wy = f.drawY;
  } else {
    const pad = state.pads[f.pad];
    wx = pad.x; wy = pad.y;
  }
  const sx = wx - cam.x, sy = wy - cam.y;
  const frogDef = FROGS[save.selectedFrog];
  const sprite = remapSprite(f.jumping ? FROG_JUMP : FROG, frogDef.colorMap);
  const offX = -Math.floor(sprite[0].length / 2);
  const offY = -sprite.length + 2;
  drawSprite(sprite, sx + offX, sy + offY);
  // Frog specular highlights + shadow
  const fsx = Math.floor(sx + offX), fsy = Math.floor(sy + offY);
  ctx.fillStyle = LIGHT.specular;
  ctx.fillRect(fsx + 2, fsy + 2, 1, 1);
  ctx.fillRect(fsx + 3, fsy + 3, 1, 1);
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(fsx + 9, fsy + 7, 1, 1);
  ctx.fillRect(fsx + 8, fsy + 8, 1, 1);
}

function drawHUD() {
  // Score + level
  ctx.fillStyle = '#00000088';
  ctx.fillRect(1, 1, 90, 10);
  ctx.fillStyle = '#ffffff';
  ctx.font = `5px ${F}`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('LV' + save.level + ' ' + state.score + 'PTS', 3, 3);

  // Skill points (top right)
  if (save.skillPoints > 0) {
    ctx.fillStyle = '#00000088';
    ctx.fillRect(W - 36, 1, 35, 10);
    ctx.fillStyle = P[10];
    ctx.font = `5px ${F}`;
    ctx.textAlign = 'right';
    ctx.fillText(save.skillPoints + 'SP', W - 3, 3);
  }

  // XP bar (bottom)
  const needed = xpForLevel(save.level);
  const pct = Math.min(save.xp / needed, 1);
  ctx.fillStyle = '#00000088';
  ctx.fillRect(0, H - 7, W, 7);
  ctx.fillStyle = P[3];
  ctx.fillRect(1, H - 6, Math.floor((W - 2) * pct), 3);
  ctx.fillStyle = '#ffffffbb';
  ctx.font = `5px ${F}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText(save.xp + '/' + needed + 'XP', W / 2, H - 7);

  // Pause button (touch only)
  if (hasTouchInput) {
    const pby = save.skillPoints > 0 ? 13 : 2;
    ctx.fillStyle = '#00000066';
    ctx.fillRect(W - 15, pby, 13, 10);
    ctx.fillStyle = '#ffffff99';
    ctx.fillRect(W - 12, pby + 2, 2, 6);
    ctx.fillRect(W - 7, pby + 2, 2, 6);
  }

  // Minimap (bottom-right)
  drawMinimap();
}

function drawMinimap() {
  const s = 10;
  const gap = 1;
  const mx = W - (3 * s + 2 * gap) - 3, my = H - (3 * s + 2 * gap) - 3;

  // [gridCol, gridRow, sectionIndex, label]
  const cells = [
    [1, 0, 1, 'N'],
    [0, 1, 2, 'W'],
    [1, 1, 0, 'C'],
    [2, 1, 3, 'E'],
    [1, 2, 4, 'S'],
  ];

  cells.forEach(([cx, cy, si, label]) => {
    const rx = mx + cx * (s + gap);
    const ry = my + cy * (s + gap);
    const isCurrent = si === state.currentSection;
    const visited = state.visitedSections && state.visitedSections.has(si);
    ctx.fillStyle = isCurrent ? P[3] : visited ? '#ffffff44' : '#ffffff22';
    ctx.fillRect(rx, ry, s, s);

    // Section letter
    ctx.fillStyle = isCurrent ? '#ffffff' : visited ? '#ffffffaa' : '#ffffff55';
    ctx.font = `4px ${F}`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, rx + s / 2, ry + s / 2 + 1);

    // Frog dot on current section
    if (isCurrent) {
      const pad = state.pads[state.frog.pad];
      if (pad) {
        const sec = SECTIONS[si];
        const fx = rx + 1 + ((pad.x - sec.wx) / W) * (s - 2);
        const fy = ry + 1 + ((pad.y - sec.wy) / H) * (s - 2);
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(Math.floor(fx), Math.floor(fy), 2, 2);
      }
    }
  });
}

function drawEdgeArrows() {
  const sec = SECTIONS[state.currentSection];
  const alpha = 0.4 + 0.3 * Math.sin(state.time * 0.003);
  ctx.globalAlpha = alpha;

  // For each border where current section is sA, show arrow at that edge
  BORDERS.forEach(([sA, sB, side]) => {
    let arrowSec, dir;
    if (sA === state.currentSection) { arrowSec = sB; dir = side; }
    else if (sB === state.currentSection) {
      arrowSec = sA;
      // Flip direction (if CENTER's top touches NORTH, then from NORTH's perspective it's bottom)
      dir = side === 'top' ? 'bottom' : side === 'bottom' ? 'top' : side === 'left' ? 'right' : 'left';
    } else return;

    const label = SECTIONS[arrowSec].name[0]; // First letter: N, W, E, S, or C
    let sprite, sx, sy, lx, ly;
    if (dir === 'top') {
      sprite = ARROW_UP; sx = W / 2 - 2; sy = 3; lx = W / 2; ly = 12;
    } else if (dir === 'bottom') {
      sprite = ARROW_DOWN; sx = W / 2 - 2; sy = H - 8; lx = W / 2; ly = H - 12;
    } else if (dir === 'left') {
      sprite = ARROW_LEFT; sx = 3; sy = H / 2 - 2; lx = 12; ly = H / 2 + 1;
    } else {
      sprite = ARROW_RIGHT; sx = W - 8; sy = H / 2 - 2; lx = W - 12; ly = H / 2 + 1;
    }

    drawSprite(sprite, sx, sy);
    ctx.fillStyle = P[6];
    ctx.font = `4px ${F}`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, lx, ly);
  });

  ctx.globalAlpha = 1;
}

function drawFlash() {
  if (state.flash <= 0) return;
  ctx.fillStyle = `rgba(254,231,97,${state.flash})`;
  ctx.fillRect(0, 0, W, H);
  state.flash -= 0.06;
}

function drawLevelUp() {
  if (state.levelUp <= 0) return;
  const alpha = Math.min(state.levelUp / 30, 1);
  const yOff = (1 - alpha) * -8;
  ctx.fillStyle = `rgba(99,199,77,${alpha})`;
  ctx.font = `8px ${F}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('LEVEL UP!', W / 2, H / 2 - 30 + yOff);
  ctx.fillStyle = `rgba(255,255,255,${alpha * 0.9})`;
  ctx.font = `5px ${F}`;
  ctx.fillText('LV ' + save.level + '  +1 SP', W / 2, H / 2 - 17 + yOff);
  state.levelUp -= 0.8;
}

function drawSectionLabel() {
  if (state.sectionLabel <= 0) return;
  // Hold fully opaque for first 20 frames, then fade
  const alpha = state.sectionLabel > 40 ? 0.9 : (state.sectionLabel / 40) * 0.9;
  const text = '~ ' + state.sectionName + ' ~';
  ctx.font = `7px ${F}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  // Dark background pill
  const tw = ctx.measureText(text).width;
  ctx.fillStyle = `rgba(0,0,0,${alpha * 0.7})`;
  ctx.fillRect(W / 2 - tw / 2 - 5, 11, tw + 10, 14);
  // Text
  ctx.fillStyle = `rgba(255,255,255,${alpha})`;
  ctx.fillText(text, W / 2, 13);
  state.sectionLabel -= 0.6;
}

// ─── Atmosphere ─────────────────────────────────────
function initAtmosphere() {
  const atm = state.atmosphere;
  atm.fogPatches = [];
  for (let i = 0; i < 7; i++) {
    atm.fogPatches.push({
      x: Math.random() * W, y: Math.random() * H,
      w: 40 + Math.random() * 40, h: 20 + Math.random() * 20,
      speedX: 0.05 + Math.random() * 0.1,
      speedY: 0.01 + Math.random() * 0.04,
      alpha: 0.03 + Math.random() * 0.04,
      phase: Math.random() * Math.PI * 2,
    });
  }
  atm.particles = [];
  for (let i = 0; i < 20; i++) {
    const x = Math.random() * W;
    atm.particles.push({
      x, y: Math.random() * H, baseX: x,
      size: Math.random() < 0.7 ? 1 : 2,
      alpha: 0.15 + Math.random() * 0.25,
      speedY: -(0.1 + Math.random() * 0.2),
      freqX: 0.005 + Math.random() * 0.01,
      ampX: 3 + Math.random() * 5,
      phase: Math.random() * Math.PI * 2,
      hue: Math.floor(Math.random() * 3),
    });
  }
  atm.vignetteGrad = ctx.createRadialGradient(W / 2, H / 2, 30, W / 2, H / 2, 120);
  atm.vignetteGrad.addColorStop(0, 'rgba(0,0,0,0)');
  atm.vignetteGrad.addColorStop(0.6, 'rgba(0,0,0,0)');
  atm.vignetteGrad.addColorStop(0.85, 'rgba(0,0,0,0.25)');
  atm.vignetteGrad.addColorStop(1, 'rgba(0,0,0,0.55)');
}

function updateAtmosphere() {
  state.atmosphere.fogPatches.forEach(f => {
    f.x += f.speedX; f.y += f.speedY; f.phase += 0.008;
    if (f.x > W + 20) f.x = -f.w;
    if (f.y > H + 10) f.y = -f.h;
  });
  state.atmosphere.particles.forEach(p => {
    p.y += p.speedY;
    p.phase += p.freqX;
    p.x = p.baseX + Math.sin(p.phase) * p.ampX;
    if (p.y < -5) { p.y = H + 5; p.baseX = Math.random() * W; p.x = p.baseX; }
    if (p.x < -10) p.baseX += W + 20;
    if (p.x > W + 10) p.baseX -= W + 20;
  });
}

function drawColorGrade() {
  ctx.fillStyle = 'rgba(60,50,100,0.06)';
  ctx.fillRect(0, 0, W, H);
}

function drawFogOverlay() {
  state.atmosphere.fogPatches.forEach(f => {
    const pulse = 0.6 + 0.4 * Math.sin(f.phase);
    const a = f.alpha * pulse;
    ctx.fillStyle = `rgba(180,190,210,${a})`;
    const cx = Math.floor(f.x), cy = Math.floor(f.y);
    const hw = Math.floor(f.w / 2), hh = Math.floor(f.h / 2);
    ctx.fillRect(cx - hw + 4, cy - hh, f.w - 8, 3);
    ctx.fillRect(cx - hw, cy - hh + 3, f.w, f.h - 6);
    ctx.fillRect(cx - hw + 4, cy + hh - 3, f.w - 8, 3);
  });
}

function drawVignette() {
  ctx.fillStyle = state.atmosphere.vignetteGrad;
  ctx.fillRect(0, 0, W, H);
}

function drawParticles() {
  state.atmosphere.particles.forEach(p => {
    const flicker = 0.5 + 0.5 * Math.sin(state.time * 0.002 + p.phase * 10);
    const a = p.alpha * flicker;
    if (a < 0.05) return;
    if (p.hue === 0) ctx.fillStyle = `rgba(220,220,230,${a})`;
    else if (p.hue === 1) ctx.fillStyle = `rgba(140,160,200,${a})`;
    else ctx.fillStyle = `rgba(200,210,140,${a})`;
    ctx.fillRect(Math.floor(p.x), Math.floor(p.y), p.size, p.size);
  });
}

function drawAtmosphere() {
  drawColorGrade();
  drawFogOverlay();
  drawVignette();
  drawParticles();
}

// ─── Game Logic ─────────────────────────────────────
function findTargetPad(dir) {
  const angles = { up: -Math.PI / 2, down: Math.PI / 2, left: Math.PI, right: 0 };
  const target = angles[dir];
  const cur = state.pads[state.frog.pad];
  const cone = eff().aimCone;
  let best = -1, bestD = Infinity;

  state.pads.forEach((pad, i) => {
    if (i === state.frog.pad) return;
    const dx = pad.x - cur.x, dy = pad.y - cur.y;
    const angle = Math.atan2(dy, dx);
    const diff = Math.abs(normAngle(angle - target));
    const d = dist(cur, pad);
    // Max jump distance ~90px (covers cross-border bridge pads)
    if (diff < cone && d < 90 && d < bestD) { bestD = d; best = i; }
  });
  return best;
}

function updateCamera() {
  cam.x += (cam.tx - cam.x) * 0.1;
  cam.y += (cam.ty - cam.y) * 0.1;
  // Snap when close enough
  if (Math.abs(cam.x - cam.tx) < 0.5) cam.x = cam.tx;
  if (Math.abs(cam.y - cam.ty) < 0.5) cam.y = cam.ty;
}

function updateJump(ts) {
  if (!state.frog.jumping) return;
  const elapsed = ts - state.frog.jumpStart;
  const stats = eff();
  const t = Math.min(elapsed / stats.jumpDur, 1);

  const s = state.pads[state.frog.pad];
  const e = state.pads[state.frog.target];

  state.frog.drawX = s.x + (e.x - s.x) * t;
  state.frog.drawY = s.y + (e.y - s.y) * t;
  state.frog.drawY -= stats.jumpArc * 4 * t * (1 - t);

  if (t >= 1) {
    state.frog.pad = state.frog.target;
    state.frog.target = null;
    state.frog.jumping = false;

    // Check section change
    const newSec = state.pads[state.frog.pad].section;
    if (newSec !== state.currentSection) {
      state.currentSection = newSec;
      state.visitedSections.add(newSec);
      const sec = SECTIONS[newSec];
      cam.tx = sec.wx;
      cam.ty = sec.wy;
      state.sectionName = sec.name;
      state.sectionLabel = 60;
    }

    checkCollection();
  }
}

function updateFruitSpawning(ts) {
  const stats = eff();
  if (ts - state.lastSpawn < stats.spawnMs) return;
  state.lastSpawn = ts;

  const fruitCount = state.pads.filter(p => p.hasFruit).length;
  if (fruitCount >= stats.maxFruit) return;

  const empty = state.pads
    .map((p, i) => ({ p, i }))
    .filter(({ p, i }) => !p.hasFruit && i !== state.frog.pad);
  if (empty.length === 0) return;

  const pick = empty[Math.floor(Math.random() * empty.length)];
  const types = ['apple', 'orange', 'cherry'];
  pick.p.hasFruit = true;
  pick.p.fruitType = types[Math.floor(Math.random() * types.length)];
}

function checkCollection() {
  const pad = state.pads[state.frog.pad];
  if (!pad.hasFruit) return;
  const basePts = { apple: 10, orange: 15, cherry: 25 };
  const pts = (basePts[pad.fruitType] || 10) + eff().bonusPts;
  state.score += pts;
  pad.hasFruit = false;
  pad.fruitType = null;
  state.flash = 0.25;

  save.xp += pts;
  const needed = xpForLevel(save.level);
  if (save.xp >= needed) {
    save.xp -= needed;
    save.level++;
    save.skillPoints++;
    state.levelUp = 80;
    state.flash = 0.5;
  }
  writeSave();
}

// ─── Update & Draw ──────────────────────────────────
function update(ts) {
  updateCamera();
  updateJump(ts);
  updateFruitSpawning(ts);
}

function draw() {
  drawWater();
  state.pads.forEach(pad => {
    if (!inView(pad.x, pad.y, 20)) return;
    drawLilyPad(pad.x - cam.x, pad.y - cam.y, CONFIG.PAD_RADIUS, pad.isBridge);
    drawFruitOnPad(pad);
  });
  drawFrog();
  drawAtmosphere();
  drawFlash();
  drawLevelUp();
  drawSectionLabel();
  drawEdgeArrows();
  drawHUD();
}

// ─── Upgrade Screen ─────────────────────────────────
function buildMenu() {
  const items = [];
  items.push({ type: 'header', text: '~ FROGS ~' });
  FROGS.forEach((f, i) => {
    items.push({
      type: 'frog', index: i, name: f.name, cost: f.cost,
      owned: save.unlocked.includes(i),
      active: save.selectedFrog === i, selectable: true,
    });
  });
  items.push({ type: 'header', text: '~ JUMP ~' });
  UPGRADES.filter(u => u.cat === 'jump').forEach(u => {
    items.push({
      type: 'upgrade', id: u.id, name: u.name, desc: u.desc,
      cost: u.cost, owned: save.upgrades.includes(u.id), selectable: true,
    });
  });
  items.push({ type: 'header', text: '~ FRUIT ~' });
  UPGRADES.filter(u => u.cat === 'fruit').forEach(u => {
    items.push({
      type: 'upgrade', id: u.id, name: u.name, desc: u.desc,
      cost: u.cost, owned: save.upgrades.includes(u.id), selectable: true,
    });
  });
  return items;
}

function menuMove(dir) {
  const items = state.menuItems;
  let c = state.menuCursor;
  do {
    c += dir;
    if (c < 0) c = items.length - 1;
    if (c >= items.length) c = 0;
  } while (!items[c].selectable && c !== state.menuCursor);
  state.menuCursor = c;
}

function menuSelect() {
  const item = state.menuItems[state.menuCursor];
  if (!item || !item.selectable) return;

  if (item.type === 'frog') {
    if (item.owned) {
      save.selectedFrog = item.index;
      writeSave(); state.menuItems = buildMenu();
    } else if (save.skillPoints >= item.cost) {
      save.skillPoints -= item.cost;
      save.unlocked.push(item.index);
      save.selectedFrog = item.index;
      writeSave(); state.menuItems = buildMenu();
    }
  } else if (item.type === 'upgrade') {
    if (!item.owned && save.skillPoints >= item.cost) {
      save.skillPoints -= item.cost;
      save.upgrades.push(item.id);
      writeSave(); state.menuItems = buildMenu();
    }
  }
}

function drawUpgradeScreen() {
  drawWater();
  drawAtmosphere();
  ctx.fillStyle = '#000000aa';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = P[3];
  ctx.font = `7px ${F}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';

  ctx.fillStyle = P[10];
  ctx.font = `5px ${F}`;
  ctx.fillText('SKILL PTS: ' + save.skillPoints, W / 2, 18);

  let y = 28;
  const items = state.menuItems;
  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    const sel = i === state.menuCursor;

    if (item.type === 'header') {
      ctx.fillStyle = P[15];
      ctx.font = `5px ${F}`;
      ctx.textAlign = 'center';
      ctx.fillText(item.text, W / 2, y);
      y += 10;
      continue;
    }

    if (sel) {
      ctx.fillStyle = '#ffffff18';
      ctx.fillRect(6, y - 1, W - 12, 10);
      ctx.fillStyle = P[10];
      ctx.font = `5px ${F}`;
      ctx.textAlign = 'left';
      ctx.fillText('>', 8, y);
    }

    if (item.type === 'frog') {
      const fDef = FROGS[item.index];
      ctx.fillStyle = fDef.colorMap ? P[fDef.colorMap[3]] : P[3];
      ctx.fillRect(16, y + 1, 4, 4);
    }

    ctx.fillStyle = item.owned ? '#999999' : '#ffffff';
    ctx.font = `5px ${F}`;
    ctx.textAlign = 'left';
    ctx.fillText(item.name, item.type === 'frog' ? 22 : 16, y);

    ctx.textAlign = 'right';
    if (item.type === 'frog' && item.active) {
      ctx.fillStyle = P[3];
      ctx.fillText('USE', W - 10, y);
    } else if (item.owned) {
      ctx.fillStyle = '#777777';

    } else {
      ctx.fillStyle = save.skillPoints >= item.cost ? P[10] : '#e43b44';

    y += 11;
  }

  ctx.fillStyle = '#ffffff66';
  ctx.font = `4px ${F}`;
  ctx.textAlign = 'center';
  ctx.fillText(hasTouchInput ? 'TAP ITEM · TOP:BACK' : 'UP/DN:MOVE SPC:BUY ESC:BACK', W / 2, H - 6);

  if (hasTouchInput) {

    ctx.font = `5px ${F}`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText('< BACK', 4, 8);
  }
}

// ─── Input ──────────────────────────────────────────
const KEYS = {
  ArrowUp: 'up', KeyW: 'up',
  ArrowDown: 'down', KeyS: 'down',
  ArrowLeft: 'left', KeyA: 'left',
  ArrowRight: 'right', KeyD: 'right',
};

document.addEventListener('keydown', (e) => {
  // ─ Title ─
  if (state.screen === 'title') {
    if (e.code === 'Space' || e.code === 'Enter') startGame();
    if (e.code === 'Escape' || e.code === 'KeyU') {
      state.prevScreen = 'title';
      enterUpgrades();
    }
    return;
  }

  // ─ Upgrades ─
  if (state.screen === 'upgrades') {
    if (e.code === 'ArrowUp' || e.code === 'KeyW') { e.preventDefault(); menuMove(-1); }
    if (e.code === 'ArrowDown' || e.code === 'KeyS') { e.preventDefault(); menuMove(1); }
    if (e.code === 'Space' || e.code === 'Enter') menuSelect();
    if (e.code === 'Escape') state.screen = state.prevScreen;
    return;
  }

  // ─ Paused ─
  if (state.screen === 'paused') {
    if (e.code === 'ArrowUp' || e.code === 'KeyW') {
      e.preventDefault();
      state.pauseCursor = (state.pauseCursor - 1 + PAUSE_ITEMS.length) % PAUSE_ITEMS.length;
    }
    if (e.code === 'ArrowDown' || e.code === 'KeyS') {
      e.preventDefault();
      state.pauseCursor = (state.pauseCursor + 1) % PAUSE_ITEMS.length;
    }
    if (e.code === 'Space' || e.code === 'Enter') pauseSelect();
    if (e.code === 'Escape') state.screen = 'playing';
    return;
  }

  // ─ Playing ─
  if (state.screen !== 'playing') return;
  if (e.code === 'Escape') {
    state.screen = 'paused';
    state.pauseCursor = 0;
    return;
  }
  if (state.frog.jumping) return;
  const dir = KEYS[e.code];
  if (!dir) return;
  e.preventDefault();
  const t = findTargetPad(dir);
  if (t >= 0) {
    state.frog.target = t;
    state.frog.jumping = true;
    state.frog.jumpStart = state.time;
  }
});

// ─── Touch Input ───────────────────────────────────
canvas.addEventListener('contextmenu', e => e.preventDefault());

function handleTouchTitle(pos) {
  if (pos.y >= 160) { state.prevScreen = 'title'; enterUpgrades(); }
  else startGame();
}

function handleTouchPlaying(pos) {
  if (pos.x >= W - 20 && pos.y <= 25) {
    state.screen = 'paused'; state.pauseCursor = 0; return;
  }
  if (state.frog.jumping) return;
  const pad = state.pads[state.frog.pad];
  const dx = pos.x - (pad.x - cam.x);
  const dy = pos.y - (pad.y - cam.y);
  if (Math.abs(dx) < 5 && Math.abs(dy) < 5) return;
  const dir = angleToDirection(dx, dy);
  const t = findTargetPad(dir);
  if (t >= 0) {
    state.frog.target = t;
    state.frog.jumping = true;
    state.frog.jumpStart = state.time;
  }
}

function handleTouchPaused(pos) {
  for (let i = 0; i < PAUSE_ITEMS.length; i++) {
    const y = 78 + i * 18;
    if (pos.y >= y - 5 && pos.y <= y + 9 && pos.x >= 46 && pos.x <= 146) {
      state.pauseCursor = i; pauseSelect(); return;
    }
  }
}

function handleTouchUpgrades(pos) {
  if (pos.y <= 16 || pos.y >= H - 12) { state.screen = state.prevScreen; return; }
  let y = 28;
  for (let i = 0; i < state.menuItems.length; i++) {
    const item = state.menuItems[i];
    if (item.type === 'header') { y += 10; continue; }
    if (item.selectable && pos.y >= y - 1 && pos.y <= y + 9) {
      state.menuCursor = i; menuSelect(); return;
    }
    y += 11;
  }
}

function handleTouch(pos) {
  if (state.screen === 'title') handleTouchTitle(pos);
  else if (state.screen === 'playing') handleTouchPlaying(pos);
  else if (state.screen === 'paused') handleTouchPaused(pos);
  else if (state.screen === 'upgrades') handleTouchUpgrades(pos);
}

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault(); hasTouchInput = true;
  handleTouch(touchToCanvas(e.changedTouches[0]));
}, { passive: false });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });
canvas.addEventListener('touchend', (e) => { e.preventDefault(); }, { passive: false });

// ─── Start / Loop ───────────────────────────────────
function enterUpgrades() {
  state.screen = 'upgrades';
  state.menuItems = buildMenu();
  state.menuCursor = state.menuItems.findIndex(i => i.selectable);
}

function startGame() {
  state.screen = 'playing';
  state.score = 0;
  state.flash = 0;
  state.levelUp = 0;
  state.pads = generateWorld();
  state.currentSection = 0;
  // Find center pad of section 0 (CENTER)
  state.frog.pad = state.pads.findIndex(p => p.section === 0);
  state.frog.jumping = false;
  state.lastSpawn = 0;
  // Snap camera to CENTER section
  const sec = SECTIONS[0];
  cam.x = cam.tx = sec.wx;
  cam.y = cam.ty = sec.wy;
  state.sectionName = 'CENTER';
  state.sectionLabel = 60;
  state.visitedSections = new Set([0]);
  initAtmosphere();
}

function gameLoop(ts) {
  state.time = ts;
  if (state.atmosphere.fogPatches.length) updateAtmosphere();
  if (state.screen === 'title') drawTitleScreen();
  else if (state.screen === 'playing') { update(ts); draw(); }
  else if (state.screen === 'paused') drawPauseMenu();
  else if (state.screen === 'upgrades') drawUpgradeScreen();
  requestAnimationFrame(gameLoop);
}

initAtmosphere();
requestAnimationFrame(gameLoop);
</script>
